<!DOCTYPE html>





<html lang="zh-CN">





<head>





<meta charset="UTF-8">





<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">





<title>卡通农场 · 货仓助手 v2.6</title>





<style>





:root{--bg:#F8FAFC;--card:#FFFFFF;--text:#0F172A;--text-secondary:#475569;--muted:#64748B;--accent:#059669;--accent-hover:#047857;--warn:#D97706;--warn-light:#FFFBEB;--danger:#DC2626;--danger-light:#FEF2F2;--border:#E2E8F0;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--radius:8px;--radius-sm:6px;--transition:150ms ease}





*{margin:0;padding:0;box-sizing:border-box}





body{font-family:'Fira Sans',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}





.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:0;z-index:20;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:space-between;gap:8px}





.topbar h1{font-size:17px;font-weight:700;white-space:nowrap}





.topbar .sub{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}





.topbar-actions{display:flex;gap:6px;flex-wrap:wrap}





.btn{padding:6px 12px;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition);white-space:nowrap;display:inline-flex;align-items:center;gap:4px}





.btn:active{transform:scale(.96)}





.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}





.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg);border-color:var(--muted)}





.btn-sm{padding:4px 10px;font-size:13px}





.btn-xs{padding:2px 6px;font-size:10px}





.stats-row{display:flex;gap:8px;padding:12px 14px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:8px;margin:0 16px 8px}





.stat-card{flex:1;min-width:90px;background:var(--card);border-radius:8px;padding:8px 12px;text-align:center;border:1px solid var(--border)}





.stat-card .v{font-size:20px;font-weight:700;line-height:1.2}





.stat-card .l{font-size:10px;color:var(--muted)}





.stat-card .cap-input{font-size:16px;font-weight:700;text-align:center;border:none;background:transparent;width:60px;cursor:pointer;border-bottom:2px dashed var(--border);outline:none}





.stat-card .cap-input:focus{border-bottom-color:var(--accent);background:var(--bg);border-radius:4px 4px 0 0;outline:none;box-shadow:0 0 0 2px rgba(5,150,105,.15)}





.stat-card .cap-label{font-size:10px;color:var(--muted)}





.stat-card .cap-used{font-size:11px;font-weight:600}





.toolbar{padding:0 16px 8px;display:flex;gap:8px;flex-wrap:wrap}





.search-input{flex:1;min-width:120px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);outline:none}





.search-input:focus{border-color:var(--accent)}





.filter-row{padding:0 16px 8px;display:flex;gap:6px;flex-wrap:wrap;overflow-x:auto}





.chip{padding:4px 10px;border-radius:12px;font-size:11px;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:all .12s;flex-shrink:0}





.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}





.chip:active{transform:scale(.95)}


.filter-row .chip{cursor:grab;user-select:none}


.filter-row .chip:active{cursor:grabbing}


.filter-row .chip.drag-over{border-color:var(--accent);box-shadow:inset 0 0 0 2px var(--accent)}


.filter-row .chip.dragging{opacity:0.4}





.main-layout{display:grid;grid-template-columns:1fr minmax(280px,340px);gap:12px;padding:0 12px 20px;height:calc(100vh - 150px)}





@media(max-width:960px){.main-layout{grid-template-columns:1fr}}





.panel{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;min-height:0;box-shadow:var(--shadow-sm)}





.panel-header{padding:8px 10px 0 10px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;background:var(--card);flex-shrink:0}





.panel-header h2{font-size:14px;font-weight:600}





.panel-body{overflow-y:auto;flex:1;min-height:0}





.section-header{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:8px}





.section-header h3{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}





.section-header .arrow{font-size:10px;color:var(--muted);display:none}





.section-body{overflow:visible}





.stock-input{width:52px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:14px;text-align:center;background:var(--bg);outline:none;font-weight:600}.stock-input:focus{border-color:var(--accent);background:var(--card)}





/* Item tiles */





.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(182px,1fr));gap:6px;padding:6px 8px}





.item-tile{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 9px;cursor:pointer;transition:all .1s;border-left:3px solid var(--accent);user-select:none}





.item-tile:active{transform:scale(.97)}





.item-tile.low{border-left-color:var(--warn)}





.item-tile.critical{border-left-color:var(--danger)}





.tile-top{display:flex;align-items:center;gap:5px;margin-bottom:4px}





.tile-icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center}





.tile-icon img{width:24px;height:24px;object-fit:contain}





.tile-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}





.tile-controls{display:flex;align-items:center;gap:3px;margin-bottom:2px}





.tile-btn{width:26px;height:26px;min-width:26px;padding:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .1s}





.tile-btn:active{background:var(--bg)}





.tile-input{width:38px;padding:3px 4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center;font-weight:600;background:var(--bg);outline:none}





.tile-input:focus{border-color:var(--accent);background:var(--card);box-shadow:0 0 0 2px rgba(5,150,105,.15);outline:none}.tile-input::-webkit-outer-spin-button,.tile-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.tile-input[type=number]{-moz-appearance:textfield}





.tile-target{font-size:10px;color:var(--muted);margin-left:auto;white-space:nowrap}





.tile-meta{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}





.tile-detail{max-height:0;overflow:hidden;transition:max-height .2s ease,opacity .15s;opacity:0;font-size:11px;color:var(--text);line-height:1.6;border-top:1px solid transparent}





.tile-detail.show{max-height:300px;opacity:1;border-top-color:var(--border);padding-top:5px;margin-top:3px}





.tile-detail .lbl{color:var(--muted)}





.tile-detail input{width:44px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:center;font-weight:600}





.side-body{padding:10px 14px;overflow-y:auto;flex:1;min-height:0}





.prio-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0ede6}





.prio-item:last-child{border-bottom:none}





.prio-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:36px;margin-right:8px}





.prio-rank.p1{background:var(--danger)}.prio-rank.p2{background:var(--warn)}.prio-rank.p3{background:var(--accent)}





.prio-info{flex:1;min-width:0}





.prio-name{font-size:13px;font-weight:600}





.prio-detail{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}





.prio-right{text-align:right;flex-shrink:0}





.prio-right .num{font-size:12px;color:var(--muted)}





.prio-right .score{font-size:13px;font-weight:700}





.empty-state{text-align:center;padding:32px 16px;color:var(--muted)}





.empty-state .big{font-size:36px;margin-bottom:6px}





input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}


.gt-slider{-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;outline:none;cursor:pointer}


.gt-slider::-webkit-slider-runnable-track{height:8px;border-radius:4px;background:linear-gradient(to right,#4caf50,#8bc34a 25%,#ffeb3b 50%,#ff9800 75%,#f44336)}


.gt-slider::-moz-range-track{height:8px;border-radius:4px;background:linear-gradient(to right,#4caf50,#8bc34a 25%,#ffeb3b 50%,#ff9800 75%,#f44336)}


.gt-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid #888;margin-top:-4px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2)}


.gt-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid #888;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2)}.slider-row{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border)}





.slider-row label{font-size:12px;font-weight:600;white-space:nowrap}





.slider-row input[type=range]{flex:1}





.slider-row .slider-val{font-size:12px;color:var(--muted);min-width:20px;text-align:right;font-weight:600}





.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}





.toast.show{opacity:1}





/* Sidebar tabs */





.tabs-header{padding:0;border-bottom:1px solid var(--border)}





.tab-bar{display:flex;gap:2px}





.tab{flex:1 1 0;padding:7px 8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;background:var(--bg);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;white-space:nowrap;transition:all var(--transition);color:var(--muted);user-select:none}.tab:hover{color:var(--text);background:#F1F5F9}





.tab.active{color:var(--text);background:var(--card);border-color:var(--border);font-weight:700;box-shadow:0 -2px 0 var(--accent) inset}





.tab:active{opacity:.7}





/* Production plan */





.plan-building{border-bottom:1px solid #f0ede6;padding:8px 0}





.plan-building:last-child{border-bottom:none}





.plan-bld-header{display:flex;align-items:center;justify-content:space-between;padding:4px 14px 6px;gap:8px}





.plan-bld-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px}





.plan-bld-time{font-size:10px;color:var(--muted);white-space:nowrap}
.chain-tree{font-size:13px;line-height:1.8;padding:8px 12px;overflow-x:auto}
.tree-prefix{font-family:'Courier New',monospace;font-size:12px;color:var(--muted);user-select:none;opacity:0.6}
.chain-item{cursor:pointer;padding:4px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;margin:2px 0;background:var(--card);border:1px solid var(--border);transition:all .12s;white-space:nowrap;font-weight:500;font-size:12px}
.chain-item:hover{background:#f0f7ec;border-color:var(--accent)}
.chain-item.raw{background:#e8f5e0;border-color:#a3d17a;color:#3b6e1e}
.chain-item.intermediate{background:#fff8e1;border-color:#f0c050;color:#8b6914}
.chain-item.final{background:#e3f0ff;border-color:#80b4e8;color:#205080}
.chain-qty{font-size:10px;color:var(--muted);margin-left:2px}
.chain-depth-badge{font-size:9px;background:var(--border);color:var(--muted);padding:1px 5px;border-radius:8px;margin-left:4px}
.chain-summary{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0;font-size:11px;color:var(--muted)}
.chain-summary span{background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:10px}
.chain-toggle{font-size:10px;color:var(--accent);cursor:pointer;margin-left:4px;user-select:none}
.chain-toggle:hover{text-decoration:underline}
.chain-expanded{margin-top:4px}





.plan-item{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:6px;margin:2px 6px;background:var(--bg);transition:background .1s}





.plan-item:active{background:#e8e4dc}





.plan-item-info{flex:1;min-width:0}





.plan-item-name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}





.plan-item-detail{font-size:10px;color:var(--muted)}





.plan-item-action{flex-shrink:0}











/* Edit modal */





.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center}





.modal-overlay.hidden{display:none}





.modal-box{background:var(--card);border-radius:12px;padding:24px;max-width:520px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15);border:1px solid var(--border)}





.modal-box h3{font-size:15px;font-weight:700;margin-bottom:16px}





.modal-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}





.modal-row label{font-size:13px;font-weight:600;min-width:60px;color:var(--text);line-height:36px}





.modal-row input,.modal-row select{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);outline:none;height:36px;box-sizing:border-box}
.bld-wrap{background:var(--bg);border-radius:8px;padding:8px;margin-bottom:10px}
.bld-wrap select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card);outline:none}





.modal-row input:focus,.modal-row select:focus{border-color:var(--accent)}





.modal-ing{display:flex;align-items:center;gap:4px;background:var(--bg);padding:4px 8px;border-radius:6px;margin:2px 0}





.modal-ing select{width:130px;flex-shrink:0;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:13px;background:var(--card);outline:none}
.ing-filter{flex-basis:100%;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;margin-bottom:2px;box-sizing:border-box;outline:none}
.ing-filter:focus{border-color:var(--accent)}





.modal-ing input{width:44px;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;text-align:center}





.modal-ing .btn-rm{width:22px;height:22px;padding:0;font-size:12px;line-height:1;color:var(--danger);cursor:pointer;border:none;background:none;font-weight:700}





.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}





.modal-actions .btn-danger{background:var(--danger);color:#fff}





.tile-edit{width:20px;height:20px;padding:0;font-size:12px;line-height:1;cursor:pointer;border:none;background:none;opacity:.3;transition:opacity .12s;flex-shrink:0}





.tile-edit:hover{opacity:.8}


.tile-revert{opacity:.7;color:#22c55e}


.tile-revert:hover{opacity:1}

/* 最难生产排行 */
.hardest-bar{background:linear-gradient(135deg,#1a0a0a,#2d1212);border:1px solid #4a2020;border-radius:8px;padding:8px 14px;margin:0 16px 6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:11px}
.hardest-bar .hd-label{color:#f06060;font-size:12px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:4px}
.hardest-bar .hd-items{display:flex;gap:8px;flex-wrap:wrap;flex:1;min-width:0}

var _filterDragEl = null;


function filterDragStart(e) {


  _filterDragEl = e.target;


  e.target.classList.add('dragging');


  e.dataTransfer.effectAllowed = 'move';


  e.dataTransfer.setData('text/plain', '');


}


function filterDragOver(e) {


  e.preventDefault();


  e.dataTransfer.dropEffect = 'move';


  var chip = e.target.closest('.chip');


  if (chip && chip !== _filterDragEl) {


    document.querySelectorAll('#filterRow .chip').forEach(function(c) { c.classList.remove('drag-over'); });


    chip.classList.add('drag-over');


  }


}


function filterDragLeave(e) {


  var chip = e.target.closest('.chip');


  if (chip) chip.classList.remove('drag-over');


}


function filterDrop(e) {


  e.preventDefault();


  var target = e.target.closest('.chip');


  if (!target || target === _filterDragEl) return;


  document.querySelectorAll('#filterRow .chip').forEach(function(c) { c.classList.remove('drag-over'); });


  var row = document.getElementById('filterRow');


  var chips = Array.from(row.querySelectorAll('.chip'));


  var srcIdx = chips.indexOf(_filterDragEl);


  var tgtIdx = chips.indexOf(target);


  if (srcIdx < tgtIdx) {


    row.insertBefore(_filterDragEl, target.nextElementSibling);


  } else {


    row.insertBefore(_filterDragEl, target);


  }


  saveFilterOrder();


}


function filterDragEnd(e) {


  e.target.classList.remove('dragging');


  document.querySelectorAll('#filterRow .chip').forEach(function(c) { c.classList.remove('drag-over'); });


  _filterDragEl = null;


}





// Filter row click delegation (only fire if not a drag)


var _filterDragMoved = false;


(function(){


  var fr = document.getElementById('filterRow');


  if (!fr) return;

function computeRecursiveNeeds(){





  init();





  var needs={},computing={};





  function get(id){





    if(needs.hasOwnProperty(id)) return needs[id];





    if(computing[id]) return 0;





    computing[id]=true;





    var need=Math.max(0,gt(id)-gs(id));





    var down=dm[id]||[];





    for(var i=0;i<down.length;i++) need+=get(down[i].id)*down[i].q;





    computing[id]=false;





    return needs[id]=need;





  }





  D.items.forEach(function(it){get(it.id);});





  return needs;





}

var _chainCache = {};





function totalChainTime(id){





  if (_chainCache.hasOwnProperty(id)) return _chainCache[id];





  var it = im[id];





  if (!it) return _chainCache[id] = 0;





  var mult = PROD_MULTIPLIERS[id] || 1;
  var sum = (it.t || 0) / mult;





  if (it.ing) {





    for (var i = 0; i < it.ing.length; i++) {





      sum += totalChainTime(it.ing[i].i) * (it.ing[i].q || 0);





    }





  }





  return _chainCache[id] = sum;





}

// Simple pinyin first-letter helper (covers common Chinese chars)
var _pinyinMap=null;


function _pyFL(str){
  if(typeof pinyinPro==="undefined") return str;
  var result="";
  for(var i=0;i<str.length;i++){
    var ch=str.charAt(i);
    if(/[一-鿿㐀-䶿]/.test(ch)){
      var py=pinyinPro.pinyin(ch,{toneType:"none",type:"array"});
      if(py&&py[0]) result+=py[0].charAt(0);
      else result+="z";
    }else if(/[a-zA-Z]/.test(ch)) result+=ch.toLowerCase();
    else if(/[0-9]/.test(ch)) result+=ch;
    else result+="z";
  }
  return result||"z";
}



function filterBldOptions(val){

function refreshIngUI(){
  var h='';
  // Build items with pinyin and first-char info
  var itemsWithPinyin=D.items.map(function(it){
    var name=it.nameCN||it.id;
    var firstChar=name.charAt(0);
    return {id:it.id, name:name, py:_pyFL(name), firstChar:firstChar};
  });
  // Sort: by pinyin first letter, then by firstChar group, then by full name
  itemsWithPinyin.sort(function(a,b){
    var ca=a.py.charAt(0).toLowerCase();
    var cb=b.py.charAt(0).toLowerCase();
    if(ca!==cb) return ca<cb?-1:1;
    // Same pinyin letter: group by same first character
    if(a.firstChar!==b.firstChar) return a.firstChar<b.firstChar?-1:1;
    // Same first character: sort by pinyin
    var c=a.py.localeCompare(b.py);
    if(c!==0) return c;
    return a.name.localeCompare(b.name,'zh');
  });
  
  // Group by pinyin first letter -> firstChar subgroup
  var groups=[];
  var curLetter='';
  itemsWithPinyin.forEach(function(item){
    var letter=item.py.charAt(0).toUpperCase();
    if(!letter) letter='#';
    if(letter!==curLetter){ curLetter=letter; groups.push({letter:letter, items:[]}); }
    groups[groups.length-1].items.push(item);
  });
  
  _ingRows.forEach(function(r,idx){
    h+='<div class="modal-ing"><input class="ing-filter" placeholder="输入搜索..." oninput="filterIngSelect(this,'+idx+')" onclick="event.stopPropagation()"><select id="ingSel_'+idx+'" onchange="_ingRows['+idx+'].i=this.value">';
    h+='<option value="">选择原料</option>';
    groups.forEach(function(g){
      h+='<optgroup label="'+g.letter+'">';
      g.items.forEach(function(item){
        h+='<option value="'+item.id+'"'+(r.i===item.id?' selected':'')+'>'+item.name+'</option>';
      });
      h+='</optgroup>';
    });
    h+='</select>';
    h+='<span>×</span><input type="number" min="1" value="'+r.q+'" onchange="_ingRows['+idx+'].q=parseInt(this.value)||1">';
    h+='<button class="btn-rm" onclick="removeIngRow('+idx+')">×</button></div>';
  });
  document.getElementById('emIngs').innerHTML=h;
}

// == 最难生产物品 Top 3 ==
function _chainDepth(id, visited){
  if (!visited) visited = {};
  if (visited[id]) return 0;
  visited[id] = true;
  var it = im[id];
  if (!it || !it.ing || it.ing.length === 0) return 1;
  var maxD = 0;
  for (var i = 0; i < it.ing.length; i++) {
    var d = _chainDepth(it.ing[i].i, visited);
    if (d > maxD) maxD = d;
  }
  return maxD + 1;
}

function renderChainView(){
  init(); _chainCache={};
  var allItems=D.items.slice().filter(function(it){return it.ing&&it.ing.length>0;});
  allItems.sort(function(a,b){return totalChainTime(b.id)-totalChainTime(a.id);});

  allItems.forEach(function(it){
    var chainTime=totalChainTime(it.id); var depth=chainDepth(it.id);
    var timeLabel=chainTime>=3600?Math.round(chainTime/3600)+'h'+Math.round(chainTime%3600/60)+'m':Math.round(chainTime/60)+'m';
    h+='<div class="plan-item" style="cursor:pointer;border-bottom:1px solid #f0ede6" onclick="toggleChainDetail(\''+it.id+'\',this)">';

    h+='</div><div class="chain-expanded" style="display:none" id="chainDet-'+it.id+'"></div></div>';
  });
  list.innerHTML=h;
}
function chainDepth(id,visited){
  if(!visited) visited={};
  if(visited[id]) return 0; visited[id]=true;
  var it=im[id]; if(!it||!it.ing||it.ing.length===0) return 1;
  var maxD=0; it.ing.forEach(function(ing){maxD=Math.max(maxD,chainDepth(ing.i,visited));});
  return 1+maxD;
}
function toggleChainDetail(id,el){
  var det=document.getElementById('chainDet-'+id);
  if(!det) return;
  if(det.style.display==='none'){
    det.style.display='block'; det.innerHTML=buildChainTree(id);
    var toggle=el.querySelector('.chain-toggle'); if(toggle) toggle.textContent='▼';
  }else{
    det.style.display='none';
    var toggle=el.querySelector('.chain-toggle'); if(toggle) toggle.textContent='▶';
  }
}
function buildChainTree(id,visited,qty,depth,prefix,isLast){
  if(!visited) visited={};
  if(visited[id]&&depth>0) return '<div style="white-space:nowrap"><span class="tree-prefix">'+prefix+(isLast?'└─ ':'├─ ')+'</span><span class="chain-item intermediate" style="opacity:.6">↩ 循环</span></div>';
  visited[id]=true;
  var it=im[id]; if(!it) return '<div style="white-space:nowrap"><span class="tree-prefix">'+prefix+(isLast?'└─ ':'├─ ')+'</span><span class="chain-item raw">??:'+id+'</span></div>';
  var emoji=it.emoji||''; var name=it.nameCN||id;
  var cls=(depth===0)?'final':((it.ing&&it.ing.length>0)?'intermediate':'raw');
  var connector=depth===0?'':(isLast?'└─ ':'├─ ');
  var h='<div style="white-space:nowrap"><span class="tree-prefix">'+prefix+connector+'</span><span class="chain-item '+cls+'">'+emoji+' '+name;
  if(qty) h+='<span class="chain-qty">×'+qty+'</span>';
  h+='</span></div>';
  if(it.ing&&it.ing.length>0){
    var newPrefix=prefix+(depth>0?(isLast?'   ':'│  '):'');
    it.ing.forEach(function(ing,idx){
      h+=buildChainTree(ing.i,Object.assign({},visited),ing.q,depth+1,newPrefix,idx===it.ing.length-1);
    });
  }
  return h;
}
function togglePlanChain(id,el){
  var det=document.getElementById('planChain-'+id);
  if(!det) return;
  if(det.style.display==='none'){
    det.style.display='block'; det.innerHTML=buildChainTree(id);
    var tg=el.querySelector('.chain-toggle'); if(tg) tg.textContent='▼';
  }else{
    det.style.display='none';
    var tg=el.querySelector('.chain-toggle'); if(tg) tg.textContent='▶';
  }
}
function buildChainSummary(id){
  var it=im[id]; if(!it) return '';
  var totalT=totalChainTime(id); var depth=chainDepth(id);
  var h='<div class="chain-summary">';
  h+='<span>⏱ 总耗时:'+(totalT>=3600?Math.round(totalT/3600)+'h'+Math.round(totalT%3600/60)+'m':Math.round(totalT/60)+'m')+'</span>';
  h+='<span>🔗 层级:'+depth+'</span>';
  if(it.ing&&it.ing.length>0) h+='<span>📦 原料:'+it.ing.length+'种</span>';
  h+='</div>';
  return h;
}
function renderChainPreview(id){
  var preview=document.getElementById('emChainPreview');
  if(!preview) return;
  var it=im[id]; if(!it||!it.ing||it.ing.length===0){preview.style.display='none';return;}
  preview.style.display='block'; preview.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px">🔗 生产链条</div>'+buildChainSummary(id)+'<div class="chain-tree" style="padding:4px 0">'+buildChainTree(id)+'</div>';
}
function renderHardest(){
  init();
  _chainCache = {};
  var scored = [];
  D.items.forEach(function(it){
    if (it.st.indexOf('silo')===0) return;
    var ct = totalChainTime(it.id);
    if (ct <= 0) return;
    var dp = _chainDepth(it.id);
    var score = ct * (1 + dp * 0.3);
    scored.push({id:it.id, name:it.nameCN, emoji:it.emoji, time:ct, depth:dp, score:score});
  });
  scored.sort(function(a,b){ return b.score - a.score; });
  var top8 = scored.slice(0, 8);
  var container = document.getElementById('hardestItems');
  if (!container) return;
  if (top8.length === 0) {
    container.innerHTML = '<span style="color:#999">暂无数据</span>';
    return;
  }
  var ranks = ['r1','r2','r3','r4','r5','r6','r7','r8'];
  var h = '';
  top8.forEach(function(r, i){
    h += '<div class="hd-card">';
    h += '<span class="hd-rank ' + ranks[i] + '">' + (i+1) + '</span>';
    h += r.emoji + ' ';
    h += '<span class="hd-name">' + r.name + '</span>';
    h += '<span class="hd-time">⏱' + fmt(r.time) + '</span>';
    if (r.depth > 1) h += '<span class="hd-depth">' + r.depth + '层</span>';
    h += '</div>';
  });
  container.innerHTML = h;
}

// Hook into existing render cycle
(function(){
  var _origCBR = calcBuyRecommendations;
  calcBuyRecommendations = function(){
    _origCBR();
    try { renderHardest(); } catch(e) {}
  };
})();</script>
